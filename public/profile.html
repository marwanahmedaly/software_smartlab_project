<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="profileTitle">Profile — Smart Lab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .lang-switch-top { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: .85rem; transition: background .2s; }
    .lang-switch-top:hover { background: var(--sidebar-bg); color: #fff; }
    .dark-mode-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-size: .85rem; margin-left: .5rem; }
    .dark-mode-btn:hover { background: var(--sidebar-bg); color: #fff; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-laptop-code"></i><span>Smart Lab</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"    class="nav-item" data-page="dashboard.html"   data-roles="admin,technician"><i class="fas fa-gauge-high"></i>    <span data-i18n="dashboard">Dashboard</span></a>
      <a href="/devices.html"      class="nav-item" data-page="devices.html"     data-roles="admin,technician"><i class="fas fa-desktop"></i>       <span data-i18n="devices">Devices</span></a>
      <a href="/issues.html"       class="nav-item" data-page="issues.html"      data-roles="admin,technician,user"><i class="fas fa-triangle-exclamation"></i> <span data-i18n="issues">My Issues</span></a>
      <a href="/maintenance.html"  class="nav-item" data-page="maintenance.html" data-roles="admin,technician"><i class="fas fa-screwdriver-wrench"></i> <span data-i18n="maintenance">Maintenance</span></a>
      <a href="/map.html"          class="nav-item" data-page="map.html"         data-roles="admin,technician"><i class="fas fa-map"></i>           <span data-i18n="map">Map</span></a>
      <a href="/alerts.html"       class="nav-item" data-page="alerts.html"      data-roles="admin,technician"><i class="fas fa-bell"></i>          <span data-i18n="alerts">Alerts</span></a>
      <a href="/ai.html"           class="nav-item" data-page="ai.html"          data-roles="admin,technician,user"><i class="fas fa-robot"></i>         <span data-i18n="aiAssistant">AI Assistant</span></a>
      <a href="/reports.html"      class="nav-item" data-page="reports.html"     data-roles="admin,technician"><i class="fas fa-chart-bar"></i>     <span data-i18n="reports">Reports</span></a>
      <a href="/calendar.html"     class="nav-item" data-page="calendar.html"    data-roles="admin,technician"><i class="fas fa-calendar-days"></i> <span data-i18n="maintenanceCalendar">Calendar</span></a>
      <a href="/activity.html"     class="nav-item" data-page="activity.html"    data-roles="admin"><i class="fas fa-list-ul"></i> <span data-i18n="activityLog">Activity</span></a>
      <a href="/admin.html"        class="nav-item" data-page="admin.html" id="admin-link" data-roles="admin"><i class="fas fa-users-cog"></i> <span data-i18n="users">Users</span></a>
    </nav>
    <div class="sidebar-footer">Smart Lab &copy; 2026</div>
  </aside>

  <header class="topbar">
    <span class="topbar-title" data-i18n="profileTitle">Profile</span>
    <div class="topbar-actions">
      <button class="dark-mode-btn" id="dark-mode-btn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      <button class="lang-switch-top" id="lang-switcher" data-i18n="langBtn">English</button>
      <div class="alert-bell" onclick="window.location='/alerts.html'"><i class="fas fa-bell"></i><span class="badge-count" id="unread-count" style="display:none">0</span></div>
      <div class="topbar-user" id="user-menu">
        <div class="avatar" id="user-avatar">U</div>
        <span id="user-name">User</span>
        <i class="fas fa-chevron-down" style="font-size:.75rem;color:#94A3B8"></i>
      </div>
      <button class="btn btn-outline btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span></button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h2 class="page-title" data-i18n="myProfile">My Profile</h2>
    </div>
    <div class="profile-grid">
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fas fa-user" style="color:var(--primary)"></i> <span data-i18n="myProfile">My Profile</span></span></div>
        <div class="card-body">
          <div class="form-group"><label data-i18n="name">Name</label><input type="text" id="profile-name" class="form-control" /></div>
          <div class="form-group"><label data-i18n="email">Email</label><input type="email" id="profile-email" class="form-control" /></div>
          <div class="form-group"><label data-i18n="role">Role</label><input type="text" id="profile-role" class="form-control" disabled /></div>
          <button class="btn btn-primary" id="save-profile-btn" data-i18n="saveChanges">Save Changes</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fas fa-lock" style="color:var(--warning)"></i> <span data-i18n="changePassword">Change Password</span></span></div>
        <div class="card-body">
          <div class="form-group"><label data-i18n="currentPassword">Current Password</label><input type="password" id="current-password" class="form-control" /></div>
          <div class="form-group"><label data-i18n="newPassword">New Password</label><input type="password" id="new-password" class="form-control" /></div>
          <div class="form-group"><label data-i18n="confirmPasswordLabel">Confirm Password</label><input type="password" id="confirm-password" class="form-control" /></div>
          <button class="btn btn-primary" id="change-password-btn" data-i18n="changePassword">Change Password</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { requireAuth, apiGet, apiPost, apiPut, fillTopbar, setActiveNav, logout, toast, filterSidebar, initDarkMode, toggleDarkMode } from '/js/api.js';
    import { setLanguage, getLang, t, applyTranslations } from '/js/i18n.js';

    const user = requireAuth();
    if (!user) throw new Error('stop');
    fillTopbar();
    setActiveNav();
    applyTranslations();
    filterSidebar();
    initDarkMode();

    document.getElementById('lang-switcher').addEventListener('click', () => { setLanguage(getLang() === 'ar' ? 'en' : 'ar'); });
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('dark-mode-btn').addEventListener('click', toggleDarkMode);

    async function loadProfile() {
      try {
        const data = await apiGet('/api/auth/profile');
        document.getElementById('profile-name').value = data.user.name;
        document.getElementById('profile-email').value = data.user.email;
        document.getElementById('profile-role').value = data.user.role;
      } catch (err) { console.error(err); }
    }

    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      try {
        await apiPut('/api/auth/profile', {
          name: document.getElementById('profile-name').value,
          email: document.getElementById('profile-email').value,
        });
        toast(t('profileUpdated'), 'success');
        fillTopbar();
      } catch (err) { toast(err.message || t('errorLoadingData'), 'error'); }
    });

    document.getElementById('change-password-btn').addEventListener('click', async () => {
      const current = document.getElementById('current-password').value;
      const newPass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (newPass !== confirm) { toast(t('passwordMismatch'), 'error'); return; }
      if (newPass.length < 8) { toast(t('atLeast8Chars'), 'error'); return; }
      try {
        await apiPost('/api/auth/change-password', { current_password: current, new_password: newPass });
        toast(t('passwordChanged'), 'success');
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
      } catch (err) { toast(err.message || t('incorrectPassword'), 'error'); }
    });

    loadProfile();
  </script>
</body>
</html>
