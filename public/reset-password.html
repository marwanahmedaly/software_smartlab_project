<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="resetTitle">Reset Password — Smart Lab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .login-page {
      background-image: linear-gradient(rgba(30,58,138,.72), rgba(30,58,138,.72)),
        url('https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1600&q=80');
    }
    .login-footer { text-align: center; margin-top: 1rem; font-size: .85rem; color: #64748B; }
    .login-footer a { color: var(--primary); font-weight: 600; }
    .error-msg { color: var(--danger); font-size: .85rem; margin-top: .5rem; display: none; }
    .success-msg { color: var(--success); font-size: .85rem; margin-top: .5rem; display: none; }
    .pass-wrap { position: relative; }
    .pass-wrap .form-control { padding-left: 2.2rem; }
    .eye-btn {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94A3B8;
      font-size: .95rem;
    }
    .lang-switch {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: .4rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: .9rem;
      backdrop-filter: blur(4px);
      transition: background .2s;
    }
    .lang-switch:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="login-page">
    <button class="lang-switch" id="lang-switcher" data-i18n="langBtn">English</button>
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-lock"></i>
        <h1 data-i18n="resetHeading">New Password</h1>
        <p data-i18n="resetDesc">Enter your new password</p>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="new-password" data-i18n="newPasswordLabel">New Password</label>
          <div class="pass-wrap">
            <input type="password" id="new-password" class="form-control" data-i18n-placeholder="passwordPlaceholder" placeholder="••••••••" required minlength="6" />
            <button type="button" class="eye-btn" id="toggle-pass1">
              <i class="fas fa-eye" id="eye-icon1"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password" data-i18n="confirmPasswordLabel">Confirm Password</label>
          <div class="pass-wrap">
            <input type="password" id="confirm-password" class="form-control" data-i18n-placeholder="passwordPlaceholder" placeholder="••••••••" required minlength="6" />
            <button type="button" class="eye-btn" id="toggle-pass2">
              <i class="fas fa-eye" id="eye-icon2"></i>
            </button>
          </div>
        </div>

        <p class="error-msg" id="err-msg"><i class="fas fa-circle-exclamation"></i> <span id="err-text"></span></p>
        <p class="success-msg" id="success-msg"><i class="fas fa-check-circle"></i> <span id="success-text"></span></p>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" id="submit-btn">
          <i class="fas fa-save"></i> <span data-i18n="resetBtn">Save Password</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="/index.html" data-i18n="backToLogin">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiPost } from '/js/api.js';
    import { setLanguage, getLang, applyTranslations, t } from '/js/i18n.js';

    applyTranslations();

    // Language switcher
    document.getElementById('lang-switcher').addEventListener('click', () => {
      const next = getLang() === 'ar' ? 'en' : 'ar';
      setLanguage(next);
    });

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('err-text').textContent = t('missingToken');
      document.getElementById('err-msg').style.display = 'flex';
      document.getElementById('submit-btn').disabled = true;
    }

    // Toggle password visibility
    document.getElementById('toggle-pass1').addEventListener('click', () => {
      const inp = document.getElementById('new-password');
      const icon = document.getElementById('eye-icon1');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    });

    document.getElementById('toggle-pass2').addEventListener('click', () => {
      const inp = document.getElementById('confirm-password');
      const icon = document.getElementById('eye-icon2');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    });

    const form = document.getElementById('reset-form');
    const submitBtn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('err-msg');
    const errText = document.getElementById('err-text');
    const successMsg = document.getElementById('success-msg');
    const successText = document.getElementById('success-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      errMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // Validate passwords match
      if (newPassword !== confirmPassword) {
        errText.textContent = t('passwordMismatch');
        errMsg.style.display = 'flex';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + t('resetting');

      try {
        const data = await apiPost('/api/auth/reset-password', { token, new_password: newPassword });
        successText.textContent = data.message;
        successMsg.style.display = 'flex';
        form.style.display = 'none';

        // Redirect to login after 2 seconds
        setTimeout(() => {
          window.location.href = '/index.html';
        }, 2000);
      } catch (err) {
        errText.textContent = err.message;
        errMsg.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> ' + t('resetBtn');
      }
    });
  </script>
</body>
</html>
