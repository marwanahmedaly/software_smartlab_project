<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="inventory">Inventory — Smart Lab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .lang-switch-top { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: .85rem; }
    .lang-switch-top:hover { background: var(--sidebar-bg); color: #fff; }
    .dark-mode-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-size: .85rem; margin-left: .5rem; }
    .filters { display: flex; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filters select, .filters input { padding: .5rem .75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'Cairo', sans-serif; background: var(--card-bg); color: var(--text); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-laptop-code"></i><span>Smart Lab</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"    class="nav-item" data-page="dashboard.html"   data-roles="admin,technician"><i class="fas fa-gauge-high"></i>    <span data-i18n="dashboard">Dashboard</span></a>
      <a href="/devices.html"      class="nav-item" data-page="devices.html"     data-roles="admin,technician"><i class="fas fa-desktop"></i>       <span data-i18n="devices">Devices</span></a>
      <a href="/issues.html"       class="nav-item" data-page="issues.html"      data-roles="admin,technician,user"><i class="fas fa-triangle-exclamation"></i> <span data-i18n="issues">My Issues</span></a>
      <a href="/maintenance.html"  class="nav-item" data-page="maintenance.html" data-roles="admin,technician"><i class="fas fa-screwdriver-wrench"></i> <span data-i18n="maintenance">Maintenance</span></a>
      <a href="/map.html"          class="nav-item" data-page="map.html"         data-roles="admin,technician"><i class="fas fa-map"></i>           <span data-i18n="map">Map</span></a>
      <a href="/alerts.html"       class="nav-item" data-page="alerts.html"      data-roles="admin,technician"><i class="fas fa-bell"></i>          <span data-i18n="alerts">Alerts</span></a>
      <a href="/ai.html"           class="nav-item" data-page="ai.html"          data-roles="admin,technician,user"><i class="fas fa-robot"></i>         <span data-i18n="aiAssistant">AI Assistant</span></a>
      <a href="/reports.html"      class="nav-item" data-page="reports.html"     data-roles="admin,technician"><i class="fas fa-chart-bar"></i>     <span data-i18n="reports">Reports</span></a>
      <a href="/inventory.html"    class="nav-item active" data-page="inventory.html"   data-roles="admin,technician"><i class="fas fa-boxes-stacked"></i> <span data-i18n="inventory">Inventory</span></a>
      <a href="/calendar.html"     class="nav-item" data-page="calendar.html"    data-roles="admin,technician"><i class="fas fa-calendar-days"></i> <span data-i18n="maintenanceCalendar">Calendar</span></a>
      <a href="/activity.html"     class="nav-item" data-page="activity.html"    data-roles="admin"><i class="fas fa-list-ul"></i> <span data-i18n="activityLog">Activity</span></a>
      <a href="/admin.html"        class="nav-item" data-page="admin.html" id="admin-link" data-roles="admin"><i class="fas fa-users-cog"></i> <span data-i18n="users">Users</span></a>
    </nav>
    <div class="sidebar-footer">Smart Lab &copy; 2026</div>
  </aside>

  <header class="topbar">
    <span class="topbar-title" data-i18n="inventory">Inventory</span>
    <div class="topbar-actions">
      <button class="dark-mode-btn" id="dark-mode-btn"><i class="fas fa-moon"></i></button>
      <button class="lang-switch-top" id="lang-switcher" data-i18n="langBtn">English</button>
      <div class="alert-bell" onclick="window.location='/alerts.html'"><i class="fas fa-bell"></i><span class="badge-count" id="unread-count" style="display:none">0</span></div>
      <div class="topbar-user" id="user-menu"><div class="avatar" id="user-avatar">U</div><span id="user-name">User</span><i class="fas fa-chevron-down" style="font-size:.75rem;color:#94A3B8"></i></div>
      <button class="btn btn-outline btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span></button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header" style="justify-content:space-between;align-items:center">
      <h2 class="page-title" data-i18n="inventoryManagement">Inventory Management</h2>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-outline btn-sm" id="export-btn"><i class="fas fa-file-csv"></i> <span data-i18n="exportCSV">Export CSV</span></button>
        <button class="btn btn-primary btn-sm" id="add-btn" data-roles="admin"><i class="fas fa-plus"></i> <span data-i18n="addPart">Add Part</span></button>
      </div>
    </div>
    <div class="filters">
      <select id="filter-category"><option value="" data-i18n="allCategories">All Categories</option></select>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text-muted)"><input type="checkbox" id="filter-low" /> <span data-i18n="lowStock">Low Stock</span></label>
    </div>
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr>
            <th data-i18n="partName">Part Name</th>
            <th data-i18n="category">Category</th>
            <th data-i18n="quantity">Quantity</th>
            <th data-i18n="minStock">Min Stock</th>
            <th data-i18n="unitCost">Unit Cost</th>
            <th data-i18n="supplier">Supplier</th>
            <th data-i18n="location">Location</th>
            <th data-i18n="stockStatus">Status</th>
            <th data-i18n="actions">Actions</th>
          </tr></thead>
          <tbody id="parts-tbody"><tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i></td></tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" style="max-width:560px">
      <div class="modal-header"><h3 id="modal-title" data-i18n="addPart">Add Part</h3><button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label data-i18n="partName">Part Name *</label><input type="text" id="m-name" class="form-control" /></div>
        <div class="form-group"><label data-i18n="category">Category *</label><input type="text" id="m-category" class="form-control" /></div>
        <div class="grid grid-2">
          <div class="form-group"><label data-i18n="quantity">Quantity</label><input type="number" id="m-quantity" class="form-control" value="0" /></div>
          <div class="form-group"><label data-i18n="minStock">Min Stock</label><input type="number" id="m-min_stock" class="form-control" value="5" /></div>
        </div>
        <div class="form-group"><label data-i18n="unitCost">Unit Cost</label><input type="number" id="m-unit_cost" class="form-control" value="0" step="0.01" /></div>
        <div class="grid grid-2">
          <div class="form-group"><label data-i18n="supplier">Supplier</label><input type="text" id="m-supplier" class="form-control" /></div>
          <div class="form-group"><label data-i18n="location">Location</label><input type="text" id="m-location" class="form-control" /></div>
        </div>
        <div class="form-group"><label data-i18n="notes">Notes</label><textarea id="m-notes" class="form-control" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="modal-cancel" data-i18n="cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save" data-i18n="save">Save</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, apiGet, apiPost, apiPut, apiDel, fillTopbar, setActiveNav, logout, toast, filterSidebar, guardPage, initDarkMode, toggleDarkMode } from '/js/api.js';
    import { setLanguage, getLang, t, applyTranslations } from '/js/i18n.js';

    const user = requireAuth();
    if (!user) throw new Error('stop');
    fillTopbar();
    setActiveNav();
    applyTranslations();
    filterSidebar();
    initDarkMode();

    document.getElementById('lang-switcher').addEventListener('click', () => { setLanguage(getLang() === 'ar' ? 'en' : 'ar'); });
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('dark-mode-btn').addEventListener('click', toggleDarkMode);

    let page = 1;
    const limit = 10;
    let editingId = null;

    async function loadCategories() {
      try {
        const data = await apiGet('/api/inventory/meta/categories');
        const sel = document.getElementById('filter-category');
        sel.innerHTML = '<option value="">' + t('allCategories') + '</option>';
        data.categories.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
      } catch (err) { console.error(err); }
    }

    async function load() {
      try {
        const category = document.getElementById('filter-category').value;
        const low = document.getElementById('filter-low').checked ? '1' : '';
        const data = await apiGet(`/api/inventory?category=${category}&low_stock=${low}&page=${page}&limit=${limit}`);
        const tbody = document.getElementById('parts-tbody');
        if (!data.parts.length) {
          tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><i class="fas fa-inbox"></i><p>' + t('noPartsFound') + '</p></td></tr>';
        } else {
          tbody.innerHTML = data.parts.map(p => {
            let statusBadge = `<span class="badge badge-success">${t('inStock')}</span>`;
            if (p.quantity === 0) statusBadge = `<span class="badge badge-danger">${t('outOfStock')}</span>`;
            else if (p.quantity <= p.min_stock) statusBadge = `<span class="badge badge-warning">${t('lowStockWarning')}</span>`;
            return `
              <tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>${p.quantity}</td>
                <td>${p.min_stock}</td>
                <td>$${p.unit_cost}</td>
                <td>${p.supplier || '—'}</td>
                <td>${p.location || '—'}</td>
                <td>${statusBadge}</td>
                <td>
                  <button class="btn btn-sm btn-outline" onclick="window._editPart(${p.id})"><i class="fas fa-pen"></i></button>
                  <button class="btn btn-sm btn-danger" onclick="window._deletePart(${p.id})"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
            `;
          }).join('');
        }
        renderPagination(data.total, page, limit, (p) => { page = p; load(); });
      } catch (err) { console.error(err); toast(err.message, 'error'); }
    }

    function renderPagination(total, current, limit, onChange) {
      const pages = Math.ceil(total / limit);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= pages; i++) {
        html += `<button class="btn btn-sm ${i === current ? 'btn-primary' : 'btn-outline'}" onclick="window._gotoPage(${i})">${i}</button>`;
      }
      el.innerHTML = html;
      window._gotoPage = onChange;
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      if (!guardPage('admin')) return;
      editingId = null;
      document.getElementById('modal-title').textContent = t('addPart');
      document.getElementById('m-name').value = '';
      document.getElementById('m-category').value = '';
      document.getElementById('m-quantity').value = '0';
      document.getElementById('m-min_stock').value = '5';
      document.getElementById('m-unit_cost').value = '0';
      document.getElementById('m-supplier').value = '';
      document.getElementById('m-location').value = '';
      document.getElementById('m-notes').value = '';
      document.getElementById('modal-overlay').style.display = 'flex';
    });

    window._editPart = async (id) => {
      if (!guardPage('admin')) return;
      try {
        const data = await apiGet(`/api/inventory/${id}`);
        const p = data.part;
        editingId = p.id;
        document.getElementById('modal-title').textContent = t('edit') + ' ' + p.name;
        document.getElementById('m-name').value = p.name;
        document.getElementById('m-category').value = p.category;
        document.getElementById('m-quantity').value = p.quantity;
        document.getElementById('m-min_stock').value = p.min_stock;
        document.getElementById('m-unit_cost').value = p.unit_cost;
        document.getElementById('m-supplier').value = p.supplier || '';
        document.getElementById('m-location').value = p.location || '';
        document.getElementById('m-notes').value = p.notes || '';
        document.getElementById('modal-overlay').style.display = 'flex';
      } catch (err) { toast(err.message, 'error'); }
    };

    window._deletePart = async (id) => {
      if (!guardPage('admin')) return;
      if (!confirm(t('confirmDeletePart'))) return;
      try {
        await apiDel(`/api/inventory/${id}`);
        toast(t('partDeleted'), 'success');
        load();
      } catch (err) { toast(err.message, 'error'); }
    };

    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-overlay').style.display = 'none');
    document.getElementById('modal-cancel').addEventListener('click', () => document.getElementById('modal-overlay').style.display = 'none');
    document.getElementById('modal-save').addEventListener('click', async () => {
      const payload = {
        name: document.getElementById('m-name').value,
        category: document.getElementById('m-category').value,
        quantity: Number(document.getElementById('m-quantity').value),
        min_stock: Number(document.getElementById('m-min_stock').value),
        unit_cost: Number(document.getElementById('m-unit_cost').value),
        supplier: document.getElementById('m-supplier').value,
        location: document.getElementById('m-location').value,
        notes: document.getElementById('m-notes').value,
      };
      try {
        if (editingId) {
          await apiPut(`/api/inventory/${editingId}`, payload);
          toast(t('partUpdated'), 'success');
        } else {
          await apiPost('/api/inventory', payload);
          toast(t('partAdded'), 'success');
        }
        document.getElementById('modal-overlay').style.display = 'none';
        load();
      } catch (err) { toast(err.message, 'error'); }
    });

    document.getElementById('filter-category').addEventListener('change', () => { page = 1; load(); });
    document.getElementById('filter-low').addEventListener('change', () => { page = 1; load(); });
    document.getElementById('export-btn').addEventListener('click', () => { window.location = '/api/export/devices'; });

    loadCategories();
    load();
  </script>
</body>
</html>
