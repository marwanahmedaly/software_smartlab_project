<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="forgotTitle">Reset Password — Smart Lab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .login-page {
      background-image: linear-gradient(rgba(30,58,138,.72), rgba(30,58,138,.72)),
        url('https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1600&q=80');
    }
    .login-footer { text-align: center; margin-top: 1rem; font-size: .85rem; color: #64748B; }
    .login-footer a { color: var(--primary); font-weight: 600; }
    .error-msg { color: var(--danger); font-size: .85rem; margin-top: .5rem; display: none; }
    .success-msg { color: var(--success); font-size: .85rem; margin-top: .5rem; display: none; }
    .token-box {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-family: monospace;
      font-size: .8rem;
      word-break: break-all;
      direction: ltr;
      text-align: left;
    }
    .lang-switch {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: .4rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: .9rem;
      backdrop-filter: blur(4px);
      transition: background .2s;
    }
    .lang-switch:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="login-page">
    <button class="lang-switch" id="lang-switcher" data-i18n="langBtn">English</button>
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-key"></i>
        <h1 data-i18n="forgotHeading">Reset Password</h1>
        <p data-i18n="forgotDesc">Enter your email to receive a reset link</p>
      </div>

      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="email" data-i18n="emailLabel">Email</label>
          <input type="email" id="email" class="form-control" data-i18n-placeholder="emailPlaceholder" placeholder="admin@lab.com" required />
        </div>

        <p class="error-msg" id="err-msg"><i class="fas fa-circle-exclamation"></i> <span id="err-text"></span></p>
        <p class="success-msg" id="success-msg"><i class="fas fa-check-circle"></i> <span id="success-text"></span></p>

        <div id="token-container" style="display:none;">
          <label class="form-label" data-i18n="tokenLabel">Reset Token (for demo)</label>
          <div class="token-box" id="token-display"></div>
          <button type="button" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%" id="copy-btn">
            <i class="fas fa-copy"></i> <span data-i18n="copyToken">Copy Token</span>
          </button>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" id="submit-btn">
          <i class="fas fa-paper-plane"></i> <span data-i18n="sendBtn">Send Reset Link</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="/index.html" data-i18n="backToLogin">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiPost } from '/js/api.js';
    import { setLanguage, getLang, applyTranslations, t } from '/js/i18n.js';

    applyTranslations();

    // Language switcher
    document.getElementById('lang-switcher').addEventListener('click', () => {
      const next = getLang() === 'ar' ? 'en' : 'ar';
      setLanguage(next);
    });

    const form = document.getElementById('forgot-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('err-msg');
    const errText = document.getElementById('err-text');
    const successMsg = document.getElementById('success-msg');
    const successText = document.getElementById('success-text');
    const tokenContainer = document.getElementById('token-container');
    const tokenDisplay = document.getElementById('token-display');
    const copyBtn = document.getElementById('copy-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + t('sending');
      errMsg.style.display = 'none';
      successMsg.style.display = 'none';
      tokenContainer.style.display = 'none';

      try {
        const data = await apiPost('/api/auth/forgot-password', { email });
        successText.textContent = data.message;
        successMsg.style.display = 'flex';
        emailInput.disabled = true;
        submitBtn.style.display = 'none';

        // For demo: show token if returned (backend logs it, but we can't capture that)
        // The token is logged to server console — user can check docker logs
        tokenDisplay.textContent = t('checkConsole');
        tokenContainer.style.display = 'block';
      } catch (err) {
        errText.textContent = err.message;
        errMsg.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ' + t('sendBtn');
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = tokenDisplay.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.innerHTML = '<i class="fas fa-check"></i> ' + (getLang() === 'en' ? 'Copied!' : 'Copied!');
        setTimeout(() => {
          copyBtn.innerHTML = '<i class="fas fa-copy"></i> ' + t('copyToken');
        }, 2000);
      });
    });
  </script>
</body>
</html>
