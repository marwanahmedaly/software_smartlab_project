<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="activityLog">Activity Log — Smart Lab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .lang-switch-top { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: .85rem; }
    .lang-switch-top:hover { background: var(--sidebar-bg); color: #fff; }
    .dark-mode-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: .35rem .85rem; border-radius: 8px; cursor: pointer; font-size: .85rem; margin-left: .5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    @media (max-width: 768px) { .stat-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-laptop-code"></i><span>Smart Lab</span></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"    class="nav-item" data-page="dashboard.html"   data-roles="admin,technician"><i class="fas fa-gauge-high"></i>    <span data-i18n="dashboard">Dashboard</span></a>
      <a href="/devices.html"      class="nav-item" data-page="devices.html"     data-roles="admin,technician"><i class="fas fa-desktop"></i>       <span data-i18n="devices">Devices</span></a>
      <a href="/issues.html"       class="nav-item" data-page="issues.html"      data-roles="admin,technician,user"><i class="fas fa-triangle-exclamation"></i> <span data-i18n="issues">My Issues</span></a>
      <a href="/maintenance.html"  class="nav-item" data-page="maintenance.html" data-roles="admin,technician"><i class="fas fa-screwdriver-wrench"></i> <span data-i18n="maintenance">Maintenance</span></a>
      <a href="/map.html"          class="nav-item" data-page="map.html"         data-roles="admin,technician"><i class="fas fa-map"></i>           <span data-i18n="map">Map</span></a>
      <a href="/alerts.html"       class="nav-item" data-page="alerts.html"      data-roles="admin,technician"><i class="fas fa-bell"></i>          <span data-i18n="alerts">Alerts</span></a>
      <a href="/ai.html"           class="nav-item" data-page="ai.html"          data-roles="admin,technician,user"><i class="fas fa-robot"></i>         <span data-i18n="aiAssistant">AI Assistant</span></a>
      <a href="/reports.html"      class="nav-item" data-page="reports.html"     data-roles="admin,technician"><i class="fas fa-chart-bar"></i>     <span data-i18n="reports">Reports</span></a>
      <a href="/calendar.html"     class="nav-item" data-page="calendar.html"    data-roles="admin,technician"><i class="fas fa-calendar-days"></i> <span data-i18n="maintenanceCalendar">Calendar</span></a>
      <a href="/activity.html"     class="nav-item active" data-page="activity.html"    data-roles="admin"><i class="fas fa-list-ul"></i> <span data-i18n="activityLog">Activity</span></a>
      <a href="/admin.html"        class="nav-item" data-page="admin.html" id="admin-link" data-roles="admin"><i class="fas fa-users-cog"></i> <span data-i18n="users">Users</span></a>
    </nav>
    <div class="sidebar-footer">Smart Lab &copy; 2026</div>
  </aside>

  <header class="topbar">
    <span class="topbar-title" data-i18n="activityLog">Activity Log</span>
    <div class="topbar-actions">
      <button class="dark-mode-btn" id="dark-mode-btn"><i class="fas fa-moon"></i></button>
      <button class="lang-switch-top" id="lang-switcher" data-i18n="langBtn">English</button>
      <div class="alert-bell" onclick="window.location='/alerts.html'"><i class="fas fa-bell"></i><span class="badge-count" id="unread-count" style="display:none">0</span></div>
      <div class="topbar-user" id="user-menu"><div class="avatar" id="user-avatar">U</div><span id="user-name">User</span><i class="fas fa-chevron-down" style="font-size:.75rem;color:#94A3B8"></i></div>
      <button class="btn btn-outline btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span></button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header"><h2 class="page-title" data-i18n="activityLogs">Activity Logs</h2></div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="value" id="stat-today">—</div><div class="label" data-i18n="today">Today</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-calendar-week"></i></div><div class="stat-info"><div class="value" id="stat-week">—</div><div class="label" data-i18n="thisWeek">This Week</div></div></div>
      <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-chart-pie"></i></div><div class="stat-info"><div class="value" id="stat-top">—</div><div class="label" data-i18n="action">Top Action</div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title"><i class="fas fa-list-ul" style="color:var(--primary)"></i> <span data-i18n="activityLogs">Activity Logs</span></span></div>
      <div class="table-wrapper">
        <table>
          <thead><tr>
            <th data-i18n="date">Date</th>
            <th data-i18n="user">User</th>
            <th data-i18n="action">Action</th>
            <th data-i18n="entityType">Entity</th>
            <th data-i18n="entityId">ID</th>
            <th data-i18n="ipAddress">IP</th>
          </tr></thead>
          <tbody id="activity-tbody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i></td></tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script type="module">
    import { requireAuth, apiGet, fillTopbar, setActiveNav, logout, toast, filterSidebar, formatDate, initDarkMode, toggleDarkMode } from '/js/api.js';
    import { setLanguage, getLang, t, applyTranslations } from '/js/i18n.js';

    const user = requireAuth();
    if (!user) throw new Error('stop');
    if (user.role !== 'admin') { window.location.href = '/dashboard.html'; throw new Error('stop'); }
    fillTopbar();
    setActiveNav();
    applyTranslations();
    filterSidebar();
    initDarkMode();

    document.getElementById('lang-switcher').addEventListener('click', () => { setLanguage(getLang() === 'ar' ? 'en' : 'ar'); });
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('dark-mode-btn').addEventListener('click', toggleDarkMode);

    let page = 1;
    const limit = 15;

    async function loadStats() {
      try {
        const stats = await apiGet('/api/activity/stats');
        document.getElementById('stat-today').textContent = stats.today;
        document.getElementById('stat-week').textContent = stats.week;
        document.getElementById('stat-top').textContent = stats.top_actions?.[0]?.action || '—';
      } catch (err) { console.error(err); }
    }

    async function load() {
      try {
        const data = await apiGet(`/api/activity?page=${page}&limit=${limit}`);
        const tbody = document.getElementById('activity-tbody');
        if (!data.logs.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-inbox"></i><p>' + t('noActivityFound') + '</p></td></tr>';
        } else {
          tbody.innerHTML = data.logs.map(l => `
            <tr>
              <td>${formatDate(l.created_at)}</td>
              <td>${l.user_name || '—'}</td>
              <td><span class="badge badge-info">${l.action}</span></td>
              <td>${l.entity_type}</td>
              <td>${l.entity_id || '—'}</td>
              <td>${l.ip_address || '—'}</td>
            </tr>
          `).join('');
        }
        renderPagination(data.total, page, limit, (p) => { page = p; load(); });
      } catch (err) { console.error(err); toast(err.message, 'error'); }
    }

    function renderPagination(total, current, limit, onChange) {
      const pages = Math.ceil(total / limit);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      for (let i = 1; i <= pages; i++) {
        html += `<button class="btn btn-sm ${i === current ? 'btn-primary' : 'btn-outline'}" onclick="window._gotoPage(${i})">${i}</button>`;
      }
      el.innerHTML = html;
      window._gotoPage = onChange;
    }

    loadStats();
    load();
  </script>
</body>
</html>
